apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: intranet-php-ingress
spec:
  ingressClassName: nginx
  rules:
    - host: intranet.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: intranet-php-service
                port:
                  number: 80